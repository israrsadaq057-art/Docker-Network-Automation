services:
  influxdb:
    image: influxdb:1.8-alpine
    container_name: influxdb
    restart: unless-stopped
    ports:
      - "8086:8086"

    environment:
      - INFLUXDB_DB=network_metrics
      - INFLUXDB_HTTP_AUTH_ENABLED=false

    volumes:
      - ./data/influxdb:/var/lib/influxdb

    networks:
      - network-monitoring

  grafana:
    image: grafana/grafana:10.2.0
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3000:3000"

    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=Grafana2026

    volumes:
      - ./data/grafana:/var/lib/grafana

    depends_on:
      - influxdb

    networks:
      - network-monitoring

  telegraf:
    image: telegraf:1.28-alpine
    container_name: telegraf
    restart: unless-stopped
    volumes:
      - ./telegraf/telegraf.conf:/etc/telegraf/telegraf.conf:ro

    depends_on:
      - influxdb

    networks:
      - network-monitoring

  nginx:
    image: nginx:alpine
    container_name: nginx-proxy
    restart: unless-stopped
    ports:
      - "80:80"

    volumes:
      - ./dashboard:/usr/share/nginx/html

    networks:
      - network-monitoring

  python-api:
    build: ./python-api
    container_name: python-api
    restart: unless-stopped
    ports:
      - "5000:5000"

    volumes:
      - ./python-api/backups:/app/backups
      - ./python-api/logs:/app/logs

    depends_on:
      - influxdb

    networks:
      - network-monitoring

networks:
  network-monitoring:
    driver: bridge