 # Telegraf Configuration - Collects system metrics

[agent]
  interval = "10s"
  flush_interval = "10s"

# Send metrics to InfluxDB
[[outputs.influxdb_v2]]
  urls = ["http://influxdb:8086"]
  token = "admin-token"
  organization = "network"
  bucket = "network_metrics"

# Collect CPU metrics
[[inputs.cpu]]
  percpu = true
  totalcpu = true

# Collect Memory metrics
[[inputs.mem]]

# Collect Disk metrics
[[inputs.disk]]

# Collect Network metrics
[[inputs.net]]